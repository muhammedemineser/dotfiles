include bdsettings.conf

# Shell configuration
shell fish -c "nvim -c 'terminal'"

# Minimal Tab bar styling
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# new tab/window inherit last reported CWD from shell inside :terminal
map ctrl+shift+t launch --type=tab fish -c "cd (cat /tmp/kitty_last_cwd 2>/dev/null || echo $HOME); nvim -c 'terminal'"
map ctrl+shift+enter launch fish -c "cd (cat /tmp/kitty_last_cwd 2>/dev/null || echo $HOME); nvim -c 'terminal'"

# Uncomment the following 4 lines to minimize kitty latency (higher energy usage)
# input_delay 0
# repaint_delay 2
# sync_to_monitor no
# wayland_enable_ime no
map shift+enter send_text all \e\r
font_family JetBrainsMono Nerd Font
font_size 10.0
enable_audio_bell no\ncursor_blink_interval 0
clipboard_control write-clipboard write-primary read-clipboard read-primary
linux_display_server x11
map alt+2 launch --type=overlay-main nvim
sync_to_monitor no
repaint_delay 10
input_delay 3
map alt+1 pipe @screen_scrollback overlay nvim - -c 'set filetype=scrollback' -c 'source ~/.vim/ftplugin/scrollback.vim'
allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}.sock
shell_integration enabled
startup_session ~/.config/kitty/startup.session
scrollback_lines -1
